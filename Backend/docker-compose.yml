services:
  hearbe-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hearbe-backend
    ports:
      - "${COMPOSE_HOST_PORT}:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=${COMPOSE_APP_PROFILE:-dev}
      - LOG_PATH=/logs
    volumes:
      - ${COMPOSE_HOST_LOG_PATH:-./logs}:/logs
    depends_on:
      - hearbe-mariadb
      - hearbe-redis
  hearbe-mariadb:
    image: mariadb:latest
    container_name: hearbe-mariadb
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
  hearbe-phpmyadmin:
    image: phpmyadmin:latest
    container_name: hearbe-phpmyadmin
    env_file:
      - .env
    ports:
      - "8108:80" # phpMyAdmin에 접속하는 포트
    depends_on:
      - hearbe-mariadb
  hearbe-redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    container_name: hearbe-redis
    volumes:
      - redis_data:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
  hearbe-peer:
    image: peerjs/peerjs-server
    container_name: hearbe-peer
    ports:
      - "9000:9000"
    restart: always
    command: ["--port", "9000", "--path", "/hearbe-peer"]
volumes:
  mariadb_data:
  redis_data:
