services:
  hearbe-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hearbe-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - hearbe-mariadb
      - hearbe-redis
  hearbe-mariadb:
    image: mariadb:latest
    container_name: hearbe-mariadb
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
  hearbe-phpmyadmin:
    image: phpmyadmin:latest
    container_name: hearbe-phpmyadmin
    env_file:
      - .env
    ports:
      - "8108:80" # phpMyAdmin에 접속하는 포트
    depends_on:
      - hearbe-mariadb
  hearbe-redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    container_name: hearbe-redis
    volumes:
      - redis_data:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
volumes:
  mariadb_data:
  redis_data:
