spring.application.name=Backend

# Database Configuration
# Connects to MariaDB container 'herewego' on port 3307
spring.datasource.url=jdbc:mysql://localhost:3307/herewepick?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=herewepick
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Redis Configuration
# Connects to Redis container 'herewepick-redis' on port 6379
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=1234

# JWT Configuration
# 256-bit secure random key generated on 2026-01-27
jwt.secret=FcyulrGrBSZX8E0zqcamof1w69bNNpfZh+rzxzGdWoE=
jwt.expiration=3600000

# Encryption Configuration (32 bytes)
encryption.secret-key=thisisaverysecurekeyforaes256bit
