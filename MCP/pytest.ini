[pytest]
asyncio_mode = auto
markers =
    integration: 실제 브라우저를 사용하는 통합 테스트 (deselect with '-m "not integration"')

# 테스트 출력 설정
console_output_style = progress
log_cli = false
log_cli_level = INFO

# 커버리지 설정
[coverage:run]
source = mcp
omit = 
    */tests/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
