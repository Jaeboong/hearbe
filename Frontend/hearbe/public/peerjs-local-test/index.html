<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PeerJS Local Test</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>PeerJS Local Test</h1>
        <p class="subtitle">LAN test for 1:1 video interview</p>
      </header>

      <section class="card">
        <div class="grid">
          <label>
            My ID (optional)
            <input id="myIdInput" type="text" placeholder="room-100-host" />
          </label>
          <label>
            Room
            <input id="roomInput" type="text" placeholder="100" />
          </label>
          <label>
            Role
            <select id="roleSelect">
              <option value="host">host</option>
              <option value="guest">guest</option>
            </select>
          </label>
          <button id="applyIdBtn" type="button">Apply room+role</button>
        </div>

        <div class="grid">
          <button id="initPeerBtn" type="button">Init Peer</button>
          <button id="startMediaBtn" type="button">Start Camera/Mic</button>
          <label>
            Peer ID to call
            <input id="peerIdInput" type="text" placeholder="room-100-host" />
          </label>
          <button id="callBtn" type="button">Call</button>
          <button id="hangupBtn" type="button">Hang Up</button>
          <button id="screenShareBtn" type="button">Start Screen Share</button>
        </div>

        <div class="status">
          <div>My Peer ID: <span id="myIdLabel">-</span></div>
          <div>Connection: <span id="connLabel">idle</span></div>
        </div>
      </section>

      <section class="videos">
        <div class="video-card">
          <h2>Me</h2>
          <video id="myVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-card">
          <h2>Remote</h2>
          <video id="remoteVideo" autoplay playsinline></video>
        </div>
      </section>

      <section class="card">
        <h2>Log</h2>
        <pre id="logBox"></pre>
      </section>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
