<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>사용자 페이지</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        h1 { font-size: 3rem; color: #333; margin-bottom: 30px; }
        .shopping-box {
            background-color: white;
            border: 3px solid #ce1313;
            padding: 40px;
            border-radius: 30px;
            margin: 0 auto 40px auto;
            max-width: 1000px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .main-image {
            width: 100%;
            max-width: 900px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        /* 도움 요청 버튼 스타일 통일 */
        .main-btn {
            padding: 40px 80px;
            font-size: 2rem;
            font-weight: bold;
            background-color: #ff4b4b;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 75, 75, 0.4);
            transition: 0.3s;
        }
        .main-btn:hover { background-color: #e63e3e; transform: scale(1.05); }
    </style>
</head>
<body>

<h1>사용자 페이지</h1>

<div class="shopping-box">
    <img th:src="@{/cupang.png}" class="main-image" alt="Coupang Large Image">
</div>

<div class="btn-group">
    <button id="startBtn" class="main-btn">도움 요청하기 (화면 공유 시작)</button>
</div>

<script th:inline="javascript">
    const MY_ROLE = "USER";
    console.log("역할 설정 완료:", MY_ROLE);
</script>

<script th:src="@{/jss/webrtc-mesh.js}"></script>

</body>
</html>
