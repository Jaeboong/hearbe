[pytest]
# 테스트 파일 패턴
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 기본 옵션
addopts = -v --tb=short

# asyncio 모드
asyncio_mode = auto

# 마커 정의
markers =
    asyncio: 비동기 테스트
    integration: 통합 테스트 (실제 외부 서비스 사용)
    slow: 느린 테스트

# 테스트 경로
testpaths = tests

# 로깅
log_cli = true
log_cli_level = INFO
